# See the documentation for more information:
# https://packit.dev/docs/configuration/

specfile_path: golang-github-facebook-time.spec
files_to_sync:
  - golang-github-facebook-time.spec
  - .packit.yaml

upstream_package_name: time
downstream_package_name: golang-github-facebook-time
actions:
  # Fetch the specfile from Rawhide, remove the snapshot and drop any patches
  post-upstream-clone:
    - "curl -s -o golang-github-facebook-time.spec https://src.fedoraproject.org/rpms/golang-github-facebook-time/raw/main/f/golang-github-facebook-time.spec"
    - "curl -s -o go-vendor-tools.toml https://src.fedoraproject.org/rpms/golang-github-facebook-time/raw/main/f/go-vendor-tools.toml"
    - "bash -c \"curl -s https://src.fedoraproject.org/rpms/golang-github-facebook-time/raw/main/f/sources | grep 'vendor.tar.bz2' | sed 's/SHA512 (\\(.*\\)) = \\(.*\\)/\\1 \\2/' | while read file hash; do curl -L https://src.fedoraproject.org/repo/pkgs/rpms/golang-github-facebook-time/$file/sha512/$hash/$file -o $file; done\""

srpm_build_deps:
  - bash
  - curl
  - sed

jobs:
- job: copr_build
  trigger: commit
  owner: "@meta"
  project: time
  targets:
    - fedora-stable-aarch64
    - fedora-stable-i386
    - fedora-stable-ppc64le
    - fedora-stable-s390x
    - fedora-all-x86_64
- job: copr_build
  trigger: pull_request
  owner: "@meta"
  project: time
  targets:
    - fedora-stable-aarch64
    - fedora-stable-i386
    - fedora-stable-ppc64le
    - fedora-stable-s390x
    - fedora-all-x86_64
